<div class="container my-4 text-center">

  <!-- Slider Wrapper -->
  <div class="d-flex align-items-center justify-content-center gap-3">

    <!-- Left Arrow -->
    <img 
      src="Slider/left-arrow.png" 
      (click)="prev()" 
      style="width:40px; cursor:pointer;">

    <!-- Main Image -->
    <img 
      [src]="images[index]" 
      alt="slider image"
      class="rounded shadow"
      style="width:300px; height:500px; object-fit:cover;">

    <!-- Right Arrow -->
    <img 
      src="Slider/right-arrow.png" 
      (click)="next()" 
      style="width:40px; cursor:pointer;">

  </div>

  <!-- Dots -->
  <div class="mt-3 d-flex justify-content-center gap-2">
    @for (img of images; track $index; let i = $index) {
      <img 
        [id]="i"
        (click)="dot(i)"
        [src]="index === i ? 'Slider/button.png' : 'Slider/rec.png'"
        style="width:12px; cursor:pointer;">
    }
  </div>

  <!-- Button -->
  <!-- <button 
    class="btn btn-primary mt-3 px-4"
    (click)="toggleSlide()">
    {{ isPlaying ? 'Stop' : 'Start Slideshow' }}
  </button> -->

</div>
