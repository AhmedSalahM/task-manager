<div class="slider">

  <div>
 <img src="Slider/left-arrow.png" (click)="prev()">
  <img [src]="images[index]" alt="slider image" width="300px" height="500px">
 <img src="Slider/right-arrow.png" (click)="next()">
</div>
<div class="c">
    <img id="0" [src]="index === 0 ? 'Slider/button.png' : 'Slider/rec.png'" (click)="dot($event)">
    <img id="1"  [src]="index === 1 ? 'Slider/button.png' : 'Slider/rec.png'" (click)="dot($event)" >
    <img id="2"  [src]="index === 2 ? 'Slider/button.png' : 'Slider/rec.png'" (click)="dot($event)">
    <img id="3"  [src]="index === 3 ? 'Slider/button.png' : 'Slider/rec.png'" (click)="dot($event)">
</div>

  
   <button (click)="toggleSlide()">
    {{ isPlaying ? 'Stop' : 'Start Slideshow' }}
  </button>

</div>
