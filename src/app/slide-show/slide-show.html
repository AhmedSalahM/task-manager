<div class="slider">

  <div>
 <img src="Slider/left-arrow.png" (click)="prev()">
  <img [src]="images[index]" alt="slider image" width="300px" height="500px">
 <img src="Slider/right-arrow.png" (click)="next()">
</div>

<div class="c">
   @for (img of images; track $index; let i = $index) {
    <img 
      [id]="i"
      [src]="index === i ? 'Slider/button.png' : 'Slider/rec.png'"
      (click)="dot(i)">
  }
</div>

  
   <button (click)="toggleSlide()">
    {{ isPlaying ? 'Stop' : 'Start Slideshow' }}
  </button>

</div>
