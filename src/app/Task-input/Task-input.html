<div class="task-input">
  <label>Task Title</label>
  <input [(ngModel)]="curTask.title" type="text" placeholder="Task Title" />
  <label>Description</label>
  <textarea [(ngModel)]="curTask.description" placeholder="Description"></textarea>
<label>Priorty</label>
  <select [(ngModel)]="curTask.priority">
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>
<label>Date</label>
  <input [(ngModel)]="curTask.date" type="date" />
<label>Category</label>
  <select [(ngModel)]="curTask.category">
    <option>Work</option>
    <option>Personal</option>
    <option>Study</option>
  </select>

  <button (click)="addTask()">Add Task</button>
</div>
